<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mark Oguche logo mark">
  <defs>
    <linearGradient id="hex-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c4b8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background for favicon contexts -->
  <rect width="64" height="64" rx="14" fill="#060a0e"/>

  <!-- Hexagon -->
  <polygon
    points="32,6 50,16 50,36 32,46 14,36 14,16"
    fill="none"
    stroke="url(#hex-stroke)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- M -->
  <text
    x="32" y="38"
    font-family="'Syne', sans-serif"
    font-weight="800"
    font-size="24"
    fill="#e8ecf0"
    text-anchor="middle"
  >M</text>

  <!-- Teal dot bottom-right corner of hex -->
  <circle cx="50" cy="36" r="3" fill="#00c4b8"/>
</svg>
