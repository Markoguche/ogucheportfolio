<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mark Oguche — Frontend Engineer">
  <defs>
    <linearGradient id="rule-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c4b8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Hexagon mark -->
  <polygon
    points="36,4 54,14 54,34 36,44 18,34 18,14"
    fill="none"
    stroke="#00c4b8"
    stroke-width="2.5"
    stroke-linejoin="round"
  />
  <!-- M inside hex -->
  <text
    x="36" y="31"
    font-family="'Syne', sans-serif"
    font-weight="800"
    font-size="20"
    fill="#e8ecf0"
    text-anchor="middle"
    dominant-baseline="auto"
  >M</text>

  <!-- Full name -->
  <text
    x="70" y="30"
    font-family="'Syne', sans-serif"
    font-weight="800"
    font-size="26"
    fill="#e8ecf0"
    letter-spacing="-0.5"
  >Mark Oguche</text>

  <!-- Gradient rule under name -->
  <rect x="70" y="36" width="230" height="1.5" rx="1" fill="url(#rule-grad)"/>

  <!-- Tagline -->
  <text
    x="70" y="54"
    font-family="'DM Mono', monospace"
    font-weight="400"
    font-size="11"
    fill="#5a6878"
    letter-spacing="2.5"
  >FRONTEND ENGINEER</text>
</svg>
