<svg width="180" height="40" viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mark Oguche">
  <defs>
    <linearGradient id="rule-nav" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c4b8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Hexagon mark — scaled for navbar -->
  <polygon
    points="18,3 29,9 29,21 18,27 7,21 7,9"
    fill="none"
    stroke="#00c4b8"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <text
    x="18" y="20"
    font-family="'Syne', sans-serif"
    font-weight="800"
    font-size="13"
    fill="#e8ecf0"
    text-anchor="middle"
  >M</text>

  <!-- Name -->
  <text
    x="40" y="19"
    font-family="'Syne', sans-serif"
    font-weight="800"
    font-size="18"
    fill="#e8ecf0"
    letter-spacing="-0.3"
  >Mark Oguche</text>

  <!-- Gradient rule -->
  <rect x="40" y="23" width="133" height="1.5" rx="1" fill="url(#rule-nav)"/>
</svg>
